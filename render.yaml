services:
  - type: web
    name: fuelbunk-pro
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/fuelbunk.db
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: fuelbunk-data
      mountPath: /data
      sizeGB: 1
