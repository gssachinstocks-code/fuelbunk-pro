<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#d4940f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FuelBunk Pro">
  <meta name="description" content="Complete fuel bunk operation and financial management system">
  <title>FuelBunk Pro — Fuel Station Management</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- INLINE critical styles — visible even if app.css fails to load -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0c10; color: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Splash screen — visible by default, JS hides it */
    #splash {
      position: fixed; inset: 0; z-index: 99999;
      background: #0a0c10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
    }
    #splash-icon { font-size: 56px; }
    #splash-title { font-size: 22px; font-weight: 800; color: #f4f5f7; letter-spacing: -0.5px; }
    #splash-msg { font-size: 13px; color: #9498a5; text-align: center; max-width: 280px; line-height: 1.6; }
    #splash-bar {
      width: 180px; height: 3px; background: #1c2130; border-radius: 2px; overflow: hidden; margin-top: 4px;
    }
    #splash-bar-fill {
      height: 100%; width: 0%; background: #d4940f; border-radius: 2px;
      transition: width 0.4s ease;
    }
    #splash-reload {
      display: none; margin-top: 8px;
      background: #d4940f; color: #000; border: none;
      padding: 10px 22px; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    /* Hide splash when app is ready */
    body.app-ready #splash { display: none !important; }
  </style>
</head>
<body>

<!-- SPLASH — visible immediately, before any JS/CSS loads -->
<div id="splash">
  <div id="splash-icon">⛽</div>
  <div id="splash-title">FuelBunk Pro</div>
  <div id="splash-msg">Starting up...</div>
  <div id="splash-bar"><div id="splash-bar-fill"></div></div>
  <button id="splash-reload" onclick="location.reload(true)">↺ Reload</button>
</div>

<!-- Offline indicator -->
<div class="offline-bar" style="display:none" id="offlineBar">⚡ You're offline — Data saved locally</div>

<div class="app" id="app">
  <div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()" style="display:none"></div>
  <aside class="sidebar" id="sidebar" style="display:none">
    <div class="sidebar-brand" onclick="toggleSidebar()">
      <div class="brand-icon">⛽</div>
      <div class="brand-text">
        <h1>FuelBunk Pro</h1>
        <small>MANAGEMENT SYSTEM</small>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot" style="padding:10px 16px">
      <div style="margin-bottom:8px"><span class="online-dot"></span> <span id="tenantNameFoot" style="font-size:10px">FuelBunk Pro</span></div>
      <button onclick="mt_switchStation()" style="width:100%;background:var(--bg-0);border:1px solid var(--border-light);color:var(--text-3);border-radius:var(--radius-xs);padding:6px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:var(--font)">
        🏪 Switch Station
      </button>
    </div>
  </aside>
  <main class="main-area" style="display:none">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-icon mobile-menu-btn" onclick="toggleSidebar()" style="display:none;background:var(--bg-2);border:1px solid var(--border);padding:8px">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-left">
          <h2 id="pageTitle">Dashboard</h2>
          <div class="breadcrumb" id="breadcrumb">FuelBunk Pro</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="status-pills">
          <div class="status-pill online" id="statusPill"><span class="dot"></span><span class="status-text" style="color:var(--text-2)">Online</span></div>
        </div>
        <div class="topbar-clock">
          <div class="time" id="clock">--:--:--</div>
          <div class="date" id="dateEl">Loading...</div>
        </div>
        <div class="avatar" id="avatarEl">⛽</div>
        <button class="btn btn-ghost btn-sm" onclick="appLogout()" title="Logout" style="padding:6px 10px;font-size:14px;color:var(--text-3)">⏻</button>
      </div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>

<div class="install-banner" id="installBanner">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="brand-icon" style="width:32px;height:32px;border-radius:8px;font-size:14px">⛽</div>
    <div>
      <div class="fw-700" style="color:var(--text-0);font-size:14px">Install FuelBunk Pro</div>
      <div style="font-size:11px;color:var(--text-3)">Works offline • Faster access • Home screen</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost btn-sm" onclick="dismissInstall()">Later</button>
    <button class="btn btn-accent btn-sm" onclick="installPWA()">Install App</button>
  </div>
</div>

<script>
// Step 1: Kill ALL service workers and caches — runs before app.js
(function() {
  try {
    var fill = document.getElementById('splash-bar-fill');
    if (fill) fill.style.width = '20%';
    document.getElementById('splash-msg').textContent = 'Clearing cache...';
  } catch(e) {}

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      var promises = regs.map(function(r) { return r.unregister(); });
      return Promise.all(promises);
    }).catch(function(){});
  }
  if (window.caches) {
    caches.keys().then(function(keys) {
      keys.forEach(function(k) { caches.delete(k); });
    }).catch(function(){});
  }

  // Show reload button after 8 seconds if app still hasn't loaded
  setTimeout(function() {
    var splash = document.getElementById('splash');
    if (splash && splash.style.display !== 'none' && !document.body.classList.contains('app-ready')) {
      document.getElementById('splash-msg').textContent = 'Taking too long. Try reloading.';
      document.getElementById('splash-reload').style.display = 'inline-block';
    }
  }, 8000);
})();
</script>

<!-- Step 2: Load app.css -->
<link rel="stylesheet" href="/css/app.css?v=5.1772607851">

<!-- Step 3: Load app.js — with progress updates -->
<script>
try {
  var fill = document.getElementById('splash-bar-fill');
  if (fill) fill.style.width = '50%';
  document.getElementById('splash-msg').textContent = 'Loading application...';
} catch(e) {}
</script>
<script src="/js/app.js?v=5.1772607851" onerror="
  document.getElementById('splash-msg').textContent = 'Failed to load app.js — check your connection';
  document.getElementById('splash-reload').style.display = 'inline-block';
  document.getElementById('splash-bar-fill').style.background = '#ef4444';
  document.getElementById('splash-bar-fill').style.width = '100%';
"></script>
</body>
</html>
